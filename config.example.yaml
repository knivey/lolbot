
#per bot config items
bots:
  2: #bot id from database
    # Per-bot `listen` moved to the global top-level `listen` (Sub-project 2).
    # Set to true to enable codesand (configure server in scripts/codesand/config.yaml)
    codesand: false
    codesand_maxlines: 30
    #pump_host
    #pump_key
    #youtube_pump_host:
    #youtube_pump_key:
    # If the bot should use p2u to send a thumbnail to channel
    #youtube_thumb: true
    #youtube_thumbwidth: 60
    # NOTE: the items above (codesand, pump_*, youtube_*) are transitional and
    # still read from config.yaml; they will move to the DB in follow-up work.
    # Per-bot linktitles enable and url_log_chan now live in the DB:
    #   php admin-cli.php linktitles:set --network <id> enabled true
    #   php admin-cli.php linktitles:set --network <id> url_log_chan '#urls'


# Live-sync control surface (Sub-project 2). Keep this on localhost.
# The channel bot runs a single global REST server on `listen`; admin-cli pushes
# config changes to it (POST /_control/apply) using `control_key`.
listen: "127.0.0.1:1339"
control_key: "change-me"


#configure the database (follows doctrine config)
database:
  driver: "pdo_pgsql"
  user: lolbot
  dbname: lolbot
#database:
#  driver: "pdo_sqlite"
#  path: "db.sqlite"

# key for wolfram alpha
# https://products.wolframalpha.com/api/
#waKey: 'key'


# key for iex
# https://www.iexcloud.io/pricing/ (Under the two plans there's a just getting start 50,000 credits free plan)
#iexKey: 'key'


# Crypto script (scripts/crypto) tunables. All optional with sensible defaults.
# CoinGecko API token-bucket limiter (sized to the free Demo tier, 30 calls/min):
#crypto_api_burst: 30      # max calls allowed in a burst before throttling
#crypto_api_rate: 30       # refill rate in calls per minute
#crypto_api_maxwait: 10    # if a call would wait longer than this (seconds), warn with ETA instead of delaying
# Per-channel anti-spam cooldown (!btc/!eth/!doge/!bch/!coin/!findcoin share one bucket per channel):
#crypto_rate_cmds: 3
#crypto_rate_secs: 20
# Cooldown for the in-channel "slow down" / "API rate limit" warnings so they aren't spammed:
#crypto_warn_secs: 30


# key for bing and its options
# https://azure.microsoft.com/en-us/pricing/details/cognitive-services/search-api/
#bingKey: 'key'
#bingEP: "https://api.cognitive.microsoft.com/bing/v7.0/"
#bingLang: "en-US"


# openweather key
# https://openweathermap.org/price
#openweatherKey: "key"
# Weather uses bing maps to make the location search into lat,long for the lookups
#bingMapsKey: "key"


# Twitter API (for link info)
#twitter_bearer: "key"


# Youtube api key
# https://support.google.com/googleapi/answer/6158862?hl=en
#gkey: "key"


# If enabled are set then you need to have yt-dlp
youtube_download_shorts: false
# the bot will download youtube shorts less than 1 minute in length and save to a folder
# the url is used to make a direct link for display in channel
#youtube_host_shorts: "/home/knivey/files/"
#youtube_host_shorts_url: "https://files.h4x.life/"
#If shorts are enabled and the above options not set the bot will try to upload to filehole service

# Location of p2u binary
# https://git.trollforge.org/p2u/
# rehosted at https://github.com/knivey/p2u
#p2u: "~/p2u/p2u"


# Last.fm API key
# https://www.last.fm/api/account/create
#lastfm: key


# namecheap API user/key
#namecheap_key: key
#namecheap_user: user


# username:password on a github account, not strictly required but will greatly increase api limits
# Can just register a throwaway github for this
#github_auth: ""

# file sharing service for yoda script
filehole: "https://jonesfilesandfootmassage.com"

# Paste service for help listings and long output (now in the DB):
#   php admin-cli.php service:set paste host 'http://localhost:8080'
#   php admin-cli.php service:set paste key '...'

# SOCKS5 proxy for generic link title fetching (optional, only affects URLs not handled by special handlers)
#linktitles_proxy: "127.0.0.1:1080"
#linktitles_proxy_user: "user"
#linktitles_proxy_pass: "pass"
# Domains to exclude from the proxy (glob patterns, direct connect instead)
#linktitles_proxy_exclude:
#  - "*.internal.local"
# Domains to exclude from the proxy (regex patterns, direct connect instead)
#linktitles_proxy_exclude_regex:
#  - "/\.internal\.local$/i"
# Custom User-Agent for generic link title fetching
#linktitles_useragent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/78.0.3904.108 Safari/537.36"
# Cache TTL in seconds for link titles (default 900 = 15 minutes)
#linktitles_cache_ttl: 900

# AI vision settings for image URL descriptions (requires knivey/amphp-openai).
# AI vision service config now lives in the DB:
#   php admin-cli.php service:set ai apiKey 'sk-...'
#   php admin-cli.php service:set ai baseUrl 'https://api.openai.com/v1'
# Per-network/channel linktitles overrides (model, prompt, reasoning, enabled, url_log_chan):
#   php admin-cli.php linktitles:set --network <id> ...
